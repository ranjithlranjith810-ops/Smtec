<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SMTEC — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#eff3fb;--surface:#fff;--sf:#f7faff;--text:#12243d;--muted:#586a83;--primary:#0a5a73;--pstrong:#063a4a;--accent:#ff9f1c;--border:#d8e3ef;--shadow:0 20px 45px rgba(11,35,62,.12);--r:18px;--rsm:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Outfit",sans-serif;color:var(--text);background:radial-gradient(circle at 12% 18%,#d3efff 0%,transparent 36%),radial-gradient(circle at 90% 7%,#ffe4a9 0%,transparent 32%),linear-gradient(160deg,#ecf1fa 0%,#f9fbff 40%,#edf4ff 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;overflow:hidden;position:relative}
body::before,body::after{content:"";position:fixed;z-index:-1;filter:blur(14px);opacity:.55;pointer-events:none}
body::before{width:280px;height:280px;background:linear-gradient(140deg,#8ed4e7,#c3f0ff);top:8%;left:-90px;border-radius:32% 68% 57% 43%/41% 45% 55% 59%;animation:floatBlob 12s ease-in-out infinite}
body::after{width:300px;height:300px;background:linear-gradient(145deg,#ffd06c,#ffe7c4);bottom:-70px;right:-70px;border-radius:60% 40% 44% 56%/38% 58% 42% 62%;animation:floatBlob 14s ease-in-out infinite reverse}
@keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(18px,-22px) scale(1.04)}66%{transform:translate(-12px,14px) scale(.97)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.card{width:min(440px,100%);animation:fadeUp .7s ease both}
.hero{background:linear-gradient(130deg,#052e3c 0%,#0a5a73 45%,#0f7f9d 100%);border-radius:calc(var(--r)+8px) calc(var(--r)+8px) 0 0;color:#f9fcff;padding:2rem 2rem 1.6rem;text-align:center;position:relative;overflow:hidden;isolation:isolate}
.hero::before{content:"";position:absolute;width:260px;height:260px;background:#e0f5ff;opacity:.15;border-radius:50%;top:-130px;right:-60px;pointer-events:none}
.hero::after{content:"";position:absolute;width:200px;height:200px;background:#ffb128;opacity:.15;border-radius:50%;bottom:-90px;left:-50px;pointer-events:none}
.logo-ring{width:90px;height:90px;border-radius:50%;margin:0 auto .9rem;background:#fff;box-shadow:0 6px 24px rgba(0,0,0,.28),0 0 0 4px rgba(255,255,255,.2);overflow:hidden;cursor:pointer;position:relative;user-select:none;-webkit-tap-highlight-color:transparent}
.logo-ring img{width:100%;height:100%;object-fit:cover;pointer-events:none}
.tap-ring{position:absolute;inset:0;border-radius:50%;border:3px solid transparent;transition:border-color .15s}
.tap-ring.flash{border-color:rgba(255,224,100,.8);animation:ringPulse .3s ease}
@keyframes ringPulse{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.badge{display:inline-flex;align-items:center;gap:.45rem;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);padding:.3rem .7rem;border-radius:999px;font-size:.74rem;font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:.6rem}
.badge::before{content:"";width:7px;height:7px;border-radius:50%;background:#ffe08e;box-shadow:0 0 0 5px rgba(255,224,142,.18)}
.cn{font-family:"Playfair Display",serif;font-size:clamp(1rem,3vw,1.4rem);line-height:1.2;margin-bottom:.2rem;position:relative}
.cs{font-size:.78rem;color:#b8d8ec;position:relative}
.shell{background:rgba(255,255,255,.84);backdrop-filter:blur(10px);border:1px solid rgba(224,234,245,.95);border-top:0;border-radius:0 0 calc(var(--r)+8px) calc(var(--r)+8px);box-shadow:var(--shadow)}
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:.85rem .5rem;font-family:"Outfit",sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.3px;text-transform:uppercase;border:none;background:transparent;color:var(--muted);cursor:pointer;position:relative;transition:color .2s,background .2s}
.tab::after{content:"";position:absolute;bottom:-1px;left:0;right:0;height:3px;border-radius:3px 3px 0 0;background:linear-gradient(90deg,var(--primary),var(--accent));transform:scaleX(0);transition:transform .25s ease}
.tab.active{color:var(--pstrong);background:rgba(10,90,115,.05)}
.tab.active::after{transform:scaleX(1)}
.tab:hover:not(.active){color:var(--primary);background:rgba(10,90,115,.03)}
.panel{display:none;padding:1.6rem 1.8rem 0;animation:fadeUp .35s ease both}
.panel.active{display:block}
.ph{font-size:.98rem;font-weight:700;color:var(--pstrong);margin-bottom:1.1rem;display:flex;align-items:center;gap:.55rem}
.ph::before{content:"";width:28px;height:4px;border-radius:999px;background:linear-gradient(90deg,var(--primary),var(--accent))}
.field{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.85rem}
label{font-size:.82rem;font-weight:600;color:#2b4968}
input[type=email],input[type=password],input[type=text]{width:100%;padding:.62rem .85rem;border:1.5px solid var(--border);border-radius:var(--rsm);font-family:"Outfit",sans-serif;font-size:.9rem;color:var(--text);background:var(--sf);outline:none;transition:border-color .2s,box-shadow .2s}
input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(10,90,115,.1);background:#fff}
.err{font-size:.78rem;color:#c0392b;margin-top:.2rem;display:none}
.btn{width:100%;padding:.74rem;background:linear-gradient(130deg,#052e3c 0%,#0a5a73 55%,#0f7f9d 100%);color:#fff;font-family:"Outfit",sans-serif;font-size:.92rem;font-weight:700;letter-spacing:.3px;border:none;border-radius:var(--rsm);cursor:pointer;margin-top:.5rem;box-shadow:0 6px 20px rgba(10,90,115,.28);transition:opacity .2s,transform .15s,box-shadow .2s}
.btn:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 8px 26px rgba(10,90,115,.38)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.dev-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,159,28,.12);border:1px solid rgba(255,159,28,.35);border-radius:999px;padding:.22rem .65rem;font-size:.72rem;font-weight:700;color:#a05f00;text-transform:uppercase;letter-spacing:.4px;margin-bottom:.9rem}
.fnote{text-align:center;font-size:.74rem;color:var(--muted);padding:1rem 1.8rem .4rem}
/* dev modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(5,46,60,.6);backdrop-filter:blur(5px);z-index:9999;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--r);padding:2rem;width:min(360px,92vw);box-shadow:0 24px 60px rgba(5,30,50,.28);animation:fadeUp .3s ease both;position:relative}
.modal h3{font-family:"Playfair Display",serif;font-size:1.1rem;color:var(--pstrong);margin-bottom:.25rem}
.modal p{font-size:.8rem;color:var(--muted);margin-bottom:1.2rem}
.modal-close{position:absolute;top:.9rem;right:1rem;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted)}
.tap-hint{position:fixed;bottom:14px;right:14px;font-size:.6rem;color:rgba(0,0,0,.12);pointer-events:none;user-select:none}
</style>
</head>
<body>
<div class="card">
  <div class="hero">
    <div class="logo-ring" id="logoTap">
      <img id="logoImg" alt="SMTEC"/>
      <div class="tap-ring" id="tapRing"></div>
    </div>
    <div class="badge">Academic Portal 2026–2027</div>
    <div class="cn">St. Mother Theresa Engineering College</div>
    <div class="cs">Vagaikulam, Thoothukudi — 628 102</div>
  </div>
  <div class="shell">
    <div class="tabs">
      <button class="tab active" data-p="admin">Admin</button>
      <button class="tab" data-p="staff">Staff</button>
    </div>
    <!-- Admin -->
    <div class="panel active" id="panel-admin">
      <div class="ph">Admin Login</div>
      <div class="field"><label>Email</label><input type="email" id="a-email" placeholder="admin@smtec.edu.in"/></div>
      <div class="field"><label>Password</label><input type="password" id="a-pass" placeholder="••••••••"/></div>
      <div class="err" id="a-err"></div>
      <button class="btn" id="a-btn" onclick="doLogin('admin')">Sign In as Admin →</button>
    </div>
    <!-- Staff -->
    <div class="panel" id="panel-staff">
      <div class="ph">Staff Login</div>
      <div class="field"><label>Email</label><input type="email" id="s-email" placeholder="staff@smtec.edu.in"/></div>
      <div class="field"><label>Password</label><input type="password" id="s-pass" placeholder="••••••••"/></div>
      <div class="err" id="s-err"></div>
      <button class="btn" id="s-btn" onclick="doLogin('staff')">Sign In as Staff →</button>
    </div>
    <!-- Developer (hidden) -->
    <div class="panel" id="panel-developer" style="display:none">
      <div class="ph">Developer Access</div>
      <div class="dev-badge">⚙ Restricted — Internal Use Only</div>
      <div class="field"><label>Email</label><input type="email" id="d-email" placeholder="dev@smtec.edu.in"/></div>
      <div class="field"><label>Password</label><input type="password" id="d-pass" placeholder="••••••••"/></div>
      <div class="err" id="d-err"></div>
      <button class="btn" id="d-btn" onclick="doLogin('developer')">Developer Sign In →</button>
    </div>
    <div class="fnote">SMTEC Admission Portal · 2026–2027</div>
  </div>
</div>

<!-- Dev reveal overlay -->
<div class="overlay" id="devOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeOverlay()">✕</button>
    <h3>Developer Access</h3>
    <p>Enter the developer unlock code to reveal the login panel.</p>
    <div class="field"><label>Unlock Code</label><input type="password" id="devCode" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkCode()"/></div>
    <div class="err" id="code-err"></div>
    <button class="btn" onclick="checkCode()">Unlock →</button>
  </div>
</div>

<div class="tap-hint">v1.0</div>

// Auth state check
onAuthStateChanged(auth, async user => {
  if(!user) return;
  const snap = await get(ref(db, 'users/' + user.uid));
  if(!snap.exists()) { auth.signOut(); return; }
  const role = snap.val().role;
  if(role === 'developer') location.href = 'developer.html';
  else if(role === 'admin') location.href = 'admin.html';
  else if(role === 'staff') location.href = 'staff.html';
  else auth.signOut();
});

// Tab switching
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => { x.classList.remove('active'); if(x.id!=='panel-developer') x.style.display='none'; });
    t.classList.add('active');
    const p = document.getElementById('panel-'+t.dataset.p);
    if(p){ p.style.display='block'; p.classList.add('active'); }
  });
});

// 5-tap logo reveal
let tapCount = 0, tapTimer = null;
document.getElementById('logoTap').addEventListener('click', () => {
  tapCount++;
  const ring = document.getElementById('tapRing');
  ring.classList.remove('flash');
  void ring.offsetWidth;
  ring.classList.add('flash');
  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => { tapCount = 0; }, 1500);
  if(tapCount >= 5) {
    tapCount = 0;
    document.getElementById('devOverlay').classList.add('open');
    setTimeout(() => document.getElementById('devCode').focus(), 100);
  }
});

// Dev code check
window.checkCode = function() {
  const code = document.getElementById('devCode').value.trim();
  const err = document.getElementById('code-err');
  if(code === 'smtec@dev2026') {
    closeOverlay();
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => { x.classList.remove('active'); x.style.display='none'; });
    const dp = document.getElementById('panel-developer');
    dp.style.display = 'block'; dp.classList.add('active');
  } else {
    err.textContent = 'Incorrect code. Try again.'; err.style.display='block';
    document.getElementById('devCode').value='';
    setTimeout(() => err.style.display='none', 2500);
  }
};

window.closeOverlay = function() {
  document.getElementById('devOverlay').classList.remove('open');
  document.getElementById('devCode').value='';
};
document.getElementById('devOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) window.closeOverlay(); });

// Login
window.doLogin = async function(role) {
  const map = { admin:['a-email','a-pass','a-err','a-btn'], staff:['s-email','s-pass','s-err','s-btn'], developer:['d-email','d-pass','d-err','d-btn'] };
  const [eId,pId,errId,btnId] = map[role];
  const email = document.getElementById(eId).value.trim();
  const pass = document.getElementById(pId).value;
  const errEl = document.getElementById(errId);
  const btn = document.getElementById(btnId);
  if(!email||!pass){ errEl.textContent='Please fill all fields.'; errEl.style.display='block'; return; }
  btn.disabled=true; btn.textContent='Signing in…';
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    const snap = await get(ref(db,'users/'+cred.user.uid));
    if(!snap.exists()){ throw new Error('User not found in system'); }
    const userRole = snap.val().role;
    if(userRole !== role){ await auth.signOut(); throw new Error('Access denied for this role'); }
    if(role==='developer') location.href='developer.html';
    else if(role==='admin') location.href='admin.html';
    else location.href='staff.html';
  } catch(e) {
    let msg = 'Login failed. Check credentials.';
    if(e.code==='auth/user-not-found'||e.code==='auth/wrong-password'||e.code==='auth/invalid-credential') msg='Invalid email or password.';
    else if(e.message) msg = e.message;
    errEl.textContent = msg; errEl.style.display='block';
    btn.disabled=false; btn.textContent = role==='developer'?'Developer Sign In →': role==='admin'?'Sign In as Admin →':'Sign In as Staff →';
  }
};
</script>
